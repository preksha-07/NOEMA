<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOEMA</title>

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: black;
      overflow: hidden;
    }

    .liquid-glass {
      background: rgba(0, 0, 0, 0.4);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.3) 0%,
        rgba(255,255,255,0.1) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.1) 80%,
        rgba(255,255,255,0.3) 100%
      );

      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);

      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* SHINING TEXT */
    .shine-text {
      position: relative;
      color: white;
      letter-spacing: -0.05em;
      line-height: 0.92;
      overflow: hidden;

      background: linear-gradient(
        120deg,
        rgba(255,255,255,0.25) 0%,
        rgba(255,255,255,1) 20%,
        rgba(255,255,255,1) 40%,
        rgba(255,255,255,0.25) 60%
      );

      background-size: 200% auto;

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      animation: shine 5s linear infinite;

      text-shadow:
        0 0 12px rgba(255,255,255,0.15),
        0 0 32px rgba(255,255,255,0.08);
    }

    @keyframes shine {
      0% {
        background-position: 200% center;
      }

      100% {
        background-position: -200% center;
      }
    }

    .fade-up {
      opacity: 0;
      transform: translateY(40px);
      animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .fade-delay-1 {
      animation-delay: 0.4s;
    }

    .fade-delay-2 {
      animation-delay: 1s;
    }

    .fade-delay-3 {
      animation-delay: 1.4s;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="font-sans text-white">

  <!-- HERO -->
  <section class="relative h-screen w-full overflow-hidden bg-black">

    <!-- VIDEO -->
    <video
      class="absolute inset-0 h-full w-full object-cover"
      autoplay
      loop
      muted
      playsinline
    >
      <source
        src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260403_050628_c4e32401-fab4-4a27-b7a8-6e9291cd5959.mp4"
        type="video/mp4"
      />
    </video>

    <!-- CONTENT -->
    <div class="relative z-10 flex h-full flex-col">

      <!-- NAVBAR -->
      <header class="px-6 pt-6 md:px-12 lg:px-16">
        <nav class="liquid-glass flex items-center justify-center rounded-xl px-4 py-2">

          <!-- ONLY NOEMA -->
          <div class="text-2xl font-semibold tracking-tight">
            NOEMA
          </div>

        </nav>
      </header>

      <!-- CENTER HERO -->
      <div class="flex flex-1 items-center justify-center px-6 text-center">

        <div class="max-w-7xl">

          <!-- MAIN TITLE -->
          <h1
            class="shine-text fade-up fade-delay-1 text-5xl font-medium md:text-7xl lg:text-8xl xl:text-[9rem]"
          >
            Quantum-Inspired
            <br />
            Toolpath Intelligence
          </h1>

          <!-- SUBTEXT -->
          <p
            class="fade-up fade-delay-2 mx-auto mt-8 max-w-3xl text-base text-gray-300 md:text-xl"
          >
            Real-time digital twin optimization for intelligent manufacturing systems.
          </p>

          <!-- BUTTONS -->
          <div
            class="fade-up fade-delay-3 mt-10 flex flex-wrap items-center justify-center gap-4"
          >

            <button
onclick="window.location.href='second.html'"
class="rounded-lg bg-white px-8 py-3 font-medium text-black transition hover:bg-gray-100">
  Get Started
</button>

            <button
onclick="window.location.href='research.html'"
class="liquid-glass rounded-lg border border-white/20 px-8 py-3 font-medium text-white">
 Explore Platform
</button>

          </div>

        </div>

      </div>

    </div>

  </section>

</body>
</html>
